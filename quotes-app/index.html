<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Daily Quotes</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body>

  <div class="bg-blur"></div>

  <div class="container">
    <header>
      <span class="tag">✦ Daily Inspiration</span>
      <h1>Quote of the Moment</h1>
    </header>

    <div class="card" id="quoteCard">
      <div class="quote-icon">"</div>
      <p class="quote-text" id="quoteText">Click the button to get inspired...</p>
      <p class="quote-author" id="quoteAuthor">— Author</p>

      <div class="card-footer">
        <button class="btn-new" id="newQuoteBtn" onclick="fetchQuote()">
          <span class="btn-icon">↻</span> New Quote
        </button>
        <button class="btn-copy" id="copyBtn" onclick="copyQuote()">
          <span>Copy</span>
        </button>
      </div>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="loader" id="loader">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>

    <footer>
    <p>Powered by <a href="https://dummyjson.com" target="_blank">DummyJSON API</a></p>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
